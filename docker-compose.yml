services:
  movie-service:
    build:
      context: .
      dockerfile: movie-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://prometheus:9090/api/v1/otlp/v1/metrics
    depends_on:
      - prometheus
    networks:
      - metrics-net

  movie-client:
    build:
      context: .
      dockerfile: movie-client/Dockerfile
    ports:
      - "8080:8080"
    environment:
      MOVIE_SERVICE_URL: http://movie-service:8081
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://prometheus:9090/api/v1/otlp/v1/metrics
    depends_on:
      - movie-service
      - prometheus
    networks:
      - metrics-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-otlp-receiver'
      - '--storage.tsdb.retention.time=1h'
    networks:
      - metrics-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - metrics-net

  traffic-gen:
    image: alpine/curl:latest
    volumes:
      - ./traffic-gen/generate-traffic.sh:/generate-traffic.sh:ro
    entrypoint: ["/bin/sh", "/generate-traffic.sh"]
    depends_on:
      - movie-client
    networks:
      - metrics-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  metrics-net:
    driver: bridge
